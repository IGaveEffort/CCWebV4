name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g"       "Campus Cliques/supabase-config.js"
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" "Campus Cliques/supabase-config.js"
          sed -i "s|__ADMIN_EMAIL__|${{ secrets.ADMIN_EMAIL }}|g"           "Campus Cliques/supabase-config.js"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Campus Cliques"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
