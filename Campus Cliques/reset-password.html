<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://eemsfapreydhdhogfocg.supabase.co; connect-src 'self' https://eemsfapreydhdhogfocg.supabase.co wss://realtime.supabase.co wss://eemsfapreydhdhogfocg.supabase.co; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">
  <title>Reset Password | Campus Cliques</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="platform.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .auth-bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 30%, rgba(123,104,238,0.2), transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(192,38,211,0.12), transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 120px 24px 60px; position: relative; z-index: 1;
    }

    .auth-card { width: 100%; max-width: 480px; }

    .auth-logo { text-align: center; margin-bottom: 36px; }
    .auth-logo-name {
      font-family: Anton, sans-serif; font-size: 22px; letter-spacing: 3px;
      background: linear-gradient(135deg, #b8b0ff, #e040fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-top: 10px;
    }

    .auth-form-title { font-family: Anton, sans-serif; font-size: 28px; letter-spacing: -0.5px; margin-bottom: 6px; }
    .auth-form-sub   { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 28px; line-height: 1.5; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .full { grid-column: 1 / -1; }
    .fgrp { display: flex; flex-direction: column; }

    .auth-divider { text-align: center; margin: 28px 0 0; color: rgba(255,255,255,0.35); font-size: 13px; }
    .auth-divider a { color: #b8b0ff; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <div class="nl">
    <img src="images/logo-dark.png" alt="Campus Cliques Logo" style="width:44px;height:44px;object-fit:contain;border-radius:8px">
    <span class="nlt">CAMPUS CLIQUES</span>
  </div>
  <div class="nr"><a href="index.html">Home</a></div>
</nav>

<div class="auth-bg"></div>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="images/logo-white.png" alt="Campus Cliques" style="width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(184,176,255,0.5))">
      <div class="auth-logo-name">CAMPUS CLIQUES</div>
    </div>

    <!-- Invalid/expired link state -->
    <div id="panel-invalid" style="display:none;text-align:center">
      <div class="auth-form-title">Link expired.</div>
      <div class="auth-form-sub">This password reset link is invalid or has expired.</div>
      <a href="auth.html" class="btn-primary" style="display:inline-flex;justify-content:center;padding:14px 32px">Back to Sign In</a>
    </div>

    <!-- Reset password form -->
    <div id="panel-reset">
      <div class="auth-form-title">New password.</div>
      <div class="auth-form-sub">Choose a new password for your account.</div>
      <div id="reset-error" class="alert alert-error" style="display:none"></div>
      <form id="resetForm" novalidate>
        <div class="form-grid">
          <div class="fgrp full">
            <label class="fl">New Password</label>
            <input class="fi" name="password" type="password" placeholder="At least 8 characters" required>
          </div>
          <div class="fgrp full">
            <label class="fl">Confirm Password</label>
            <input class="fi" name="confirm" type="password" placeholder="Repeat your new password" required>
          </div>
          <div class="full">
            <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:14px;position:relative">
              <span class="btn-text">Update Password</span>
              <span class="btn-spinner" style="display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></span>
            </button>
          </div>
        </div>
      </form>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  // Supabase processes the recovery token from the URL hash automatically.
  // We listen for the PASSWORD_RECOVERY event to confirm the session is valid.
  let recoveryReady = false;

  sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true;
    }
  });

  // Give the SDK a moment to process the URL hash before deciding to show invalid state.
  // If no recovery event fires within 3 seconds, the link is invalid/expired.
  const invalidTimer = setTimeout(() => {
    if (!recoveryReady) {
      document.getElementById('panel-reset').style.display = 'none';
      document.getElementById('panel-invalid').style.display = 'block';
    }
  }, 3000);

  function setLoading(btn, on) {
    btn.disabled = on;
    btn.querySelector('.btn-text').style.opacity    = on ? '0' : '1';
    btn.querySelector('.btn-spinner').style.display = on ? 'inline-block' : 'none';
  }

  document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    document.getElementById('reset-error').style.display = 'none';

    const btn     = this.querySelector('button[type="submit"]');
    const pass    = this.querySelector('[name="password"]').value;
    const confirm = this.querySelector('[name="confirm"]').value;

    if (pass.length < 8) {
      const el = document.getElementById('reset-error');
      el.textContent = 'Password must be at least 8 characters.';
      el.style.display = 'block';
      return;
    }
    if (pass !== confirm) {
      const el = document.getElementById('reset-error');
      el.textContent = 'Passwords do not match.';
      el.style.display = 'block';
      return;
    }

    clearTimeout(invalidTimer);
    setLoading(btn, true);
    const { error } = await sb.auth.updateUser({ password: pass });
    setLoading(btn, false);

    if (error) {
      const el = document.getElementById('reset-error');
      el.textContent = 'Could not update password. Please request a new reset link.';
      el.style.display = 'block';
      return;
    }

    // Sign out so the user logs in fresh with their new password
    await sb.auth.signOut();
    window.location.href = 'auth.html?reset=1';
  });
</script>
</body>
</html>
